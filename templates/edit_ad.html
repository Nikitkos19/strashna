{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>✏️ Редактирование объявления</h2>
    <form method="POST" action="/edit/{{ ad.id }}">
        <div class="form-field">
            <label for="title">Название *</label>
            <input type="text" id="title" name="title" value="{{ ad.title }}" required>
        </div>

        <div class="form-field">
            <label for="category">Категория *</label>
            <select id="category" name="category" required>
                <option value="Электроника" {% if ad.category == 'Электроника' %}selected{% endif %}>Электроника</option>
                <option value="Спорт" {% if ad.category == 'Спорт' %}selected{% endif %}>Спорт</option>
                <option value="Мебель" {% if ad.category == 'Мебель' %}selected{% endif %}>Мебель</option>
                <option value="Одежда" {% if ad.category == 'Одежда' %}selected{% endif %}>Одежда</option>
                <option value="Недвижимость" {% if ad.category == 'Недвижимость' %}selected{% endif %}>Недвижимость</option>
                <option value="Услуги" {% if ad.category == 'Услуги' %}selected{% endif %}>Услуги</option>
                <option value="Другое" {% if ad.category == 'Другое' %}selected{% endif %}>Другое</option>
            </select>
        </div>

        <div class="form-field">
            <label for="price">Цена (₽) *</label>
            <input type="number" id="price" name="price" value="{{ ad.price }}" required>
        </div>

        <div class="form-field">
            <label for="description">Описание *</label>
            <textarea id="description" name="description" required>{{ ad.description }}</textarea>
        </div>

        <div class="form-field">
            <button type="submit">Сохранить</button>
            <a href="/" style="margin-left: 10px; text-decoration: none; color: #6c757d;">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
