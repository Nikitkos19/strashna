<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ объявлений</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<main class="page">
    <section class="panel">
        <h1>Анализ объявления</h1>
        <p class="lead">
            Вставьте JSON запроса и получите результат анализа по новому формату входных данных.
        </p>

        <form method="post" class="form">
            <label for="payload">JSON запроса</label>
            <textarea
                id="payload"
                name="payload"
                placeholder='{"itemId": 5001, "mcId": 101, "mcTitle": "Ремонт квартир и домов под ключ", "description": "Текст объявления"}'
                required
            ></textarea>
            <button type="submit">Показать результат</button>
        </form>
    </section>
</main>
</body>
</html>
