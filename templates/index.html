<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ объявлений</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<main class="page">
    <section class="panel">
        <div class="notice">
            Вставьте текст объявления, выберите исходную микрокатегорию и получите список услуг,
            для которых можно предложить отдельные черновики.
        </div>
        <h1>Анализ объявления</h1>
        <p class="lead">
            Базовая страница для будущего анализа услуг и генерации дополнительных черновиков.
        </p>

        <form method="post" class="form">
            <label for="source_mc_id">Исходная микрокатегория</label>
            <select id="source_mc_id" name="source_mc_id" required>
                <option value="" disabled selected>Выберите микрокатегорию</option>
                {% for microcategory in microcategories %}
                    <option value="{{ microcategory.mcId }}">{{ microcategory.mcTitle }}</option>
                {% endfor %}
            </select>

            <label for="description">Текст объявления</label>
            <textarea
                id="description"
                name="description"
                placeholder="Введите описание объявления..."
                required
            ></textarea>

            <button type="submit">Показать результат</button>
        </form>
    </section>
</main>
</body>
</html>
