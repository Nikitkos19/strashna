{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>➕ Новое объявление</h2>
    <form method="POST" action="/add">
        <div class="form-field">
            <label for="title">Название *</label>
            <input type="text" id="title" name="title" required placeholder="Например: iPhone 13">
        </div>

        <div class="form-field">
            <label for="category">Категория *</label>
            <select id="category" name="category" required>
                <option value="">Выберите категорию</option>
                <option value="Электроника">Электроника</option>
                <option value="Спорт">Спорт</option>
                <option value="Мебель">Мебель</option>
                <option value="Одежда">Одежда</option>
                <option value="Недвижимость">Недвижимость</option>
                <option value="Услуги">Услуги</option>
                <option value="Другое">Другое</option>
            </select>
        </div>

        <div class="form-field">
            <label for="price">Цена (₽) *</label>
            <input type="number" id="price" name="price" required placeholder="Например: 15000">
        </div>

        <div class="form-field">
            <label for="description">Описание *</label>
            <textarea id="description" name="description" required placeholder="Опишите товар или услугу..."></textarea>
        </div>

        <div class="form-field">
            <button type="submit">Опубликовать</button>
            <a href="/" style="margin-left: 10px; text-decoration: none; color: #6c757d;">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
